<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      /* Target 'body' instead of '*' so your code blocks stay hidden */
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: sans-serif;
      }
      button { 
        background-color: #f4f4f4;
        padding: 16px;
        cursor: pointer;
      }
      #labele {
        color: red;
        font-size: 50px;
      }
    </style>
  </head>
  <body>
    <h1>ESSA CLICKER</h1>
    <label id="labele">0</label><br><br>
    <button id="up">
      <h3>ESSA</h3>
    </button>

    <script>
      let up = document.getElementById('up');
      let labele = document.getElementById('labele');
      let essa = 0;
      
      up.onclick = function(){
        essa++;
        labele.textContent = essa;  
      }
    </script>
  </body>
</html>
