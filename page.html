<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f9;
      margin: 10px;
    }
    canvas {
      background-color: #222;
      display: block;
      margin: 10px auto;
      border: 4px solid #333;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }
    #score-board {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }
    .btn {
      padding: 8px 16px;
      font-size: 14px;
      background-color: #0f9d58;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #0b8043;
    }
    #instructions {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div id="score-board">Score: <span id="score">0</span></div>
  <canvas id="gameCanvas" width="260" height="260"></canvas>
  <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
  
  <div id="instructions">
    Click inside the sidebar, then use the <b>Arrow Keys</b> to control the snake.
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");
    const startBtn = document.getElementById("startBtn");

    const gridSize = 13; 
    const tileCount = canvas.width / gridSize;
    
    let snake = [];
    let food = { x: 0, y: 0 };
    let dx = gridSize;
    let dy = 0;
    let score = 0;
    let gameInterval;
    let isRunning = false;

    // Listen for direction keys
    window.addEventListener("keydown", function(e) {
      if (!isRunning) return;
      
      // Prevent browser from scrolling with arrow keys
      if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
          e.preventDefault();
      }

      switch(e.key) {
        case "ArrowLeft":
          if (dx === 0) { dx = -gridSize; dy = 0; }
          break;
        case "ArrowUp":
          if (dy === 0) { dx = 0; dy = -gridSize; }
          break;
        case "ArrowRight":
          if (dx === 0) { dx = gridSize; dy = 0; }
          break;
        case "ArrowDown":
          if (dy === 0) { dx = 0; dy = gridSize; }
          break;
      }
    });

    function startGame() {
      if (isRunning) clearInterval(gameInterval);
      
      // Reset variables
      snake = [
        { x: gridSize * 5, y: gridSize * 5 },
        { x: gridSize * 4, y: gridSize * 5 },
        { x: gridSize * 3, y: gridSize * 5 }
      ];
      dx = gridSize;
      dy = 0;
      score = 0;
      scoreDisplay.textContent = score;
      isRunning = true;
      startBtn.textContent = "Restart";
      
      spawnFood();
      gameInterval = setInterval(updateGame, 120); // Control speed (lower is faster)
    }

    function updateGame() {
      // Calculate next head coordinates
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // Wall and self collision logic
      if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || checkSelfCollision(head)) {
        gameOver();
        return;
      }

      // Add new head position
      snake.unshift(head);

      // Check if food was eaten
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreDisplay.textContent = score;
        spawnFood();
      } else {
        snake.pop(); // Remove tail if no food eaten
      }

      draw();
    }

    function checkSelfCollision(head) {
      for (let i = 0; i < snake.length; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) return true;
      }
      return false;
    }

    function spawnFood() {
      food.x = Math.floor(Math.random() * tileCount) * gridSize;
      food.y = Math.floor(Math.random() * tileCount) * gridSize;
      
      // Prevent food from spawning on top of snake body
      for (let segment of snake) {
        if (segment.x === food.x && segment.y === food.y) {
          spawnFood();
          break;
        }
      }
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = "#222";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw Snake
      ctx.fillStyle = "#0f9d58"; // Google Green
      snake.forEach((segment, index) => {
        // Make the head a slightly different shade
        if (index === 0) ctx.fillStyle = "#0b8043";
        else ctx.fillStyle = "#0f9d58";
        
        ctx.fillRect(segment.x, segment.y, gridSize - 1, gridSize - 1);
      });

      // Draw Food
      ctx.fillStyle = "#db4437"; // Google Red
      ctx.fillRect(food.x, food.y, gridSize - 1, gridSize - 1);
    }

    function gameOver() {
      clearInterval(gameInterval);
      isRunning = false;
      alert("Game Over! Your Score: " + score);
      
      // Optional: Save your score back into the active Google Doc
      google.script.run.recordHighScore(score);
    }
  </script>
</body>
</html>
